name: localization_hrms
description: >-
  Localization package for HRMS Flutter apps with 11 Indian languages, offline
  ARB strings, remote patches, and version-locked critical translations.
version: 1.0.0
homepage: https://github.com/hardikdabhi2008/localization_hrms
repository: https://github.com/hardikdabhi2008/localization_hrms
issue_tracker: https://github.com/hardikdabhi2008/localization_hrms/issues

topics:
  - localization
  - i18n
  - hrms
  - indian-languages
  - flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
